services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: swe599-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./tests:/app/tests:ro
      - ./data:/data
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  backend-gpu:
    profiles: ["gpu"]
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: swe599-backend-gpu
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./tests:/app/tests:ro
      - ./data:/data
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: swe599-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - ./data:/data
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - CHOKIDAR_USEPOLLING=true
    command: npm run dev
